<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MediScan — Identification médicament</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>

  <!-- ── Header ──────────────────────────────────────────── -->
  <header class="header">
    <div class="header-inner">
      <div class="logo">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
          <rect width="28" height="28" rx="8" fill="#0ea5e9"/>
          <path d="M14 6v16M6 14h16" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
        <span>MediScan</span>
      </div>
      <div id="db-badge" class="badge badge--loading">Chargement BD…</div>
    </div>
  </header>

  <!-- ── Main ────────────────────────────────────────────── -->
  <main class="main">

    <!-- Upload zone -->
    <section class="card upload-card" id="upload-section">
      <div class="section-label">01 — SÉLECTIONNER L'IMAGE</div>
      <div class="drop-zone" id="drop-zone">
        <div class="drop-icon">
          <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
            <circle cx="24" cy="24" r="23" stroke="#0ea5e9" stroke-width="1.5" stroke-dasharray="4 3"/>
            <path d="M24 32V20M18 26l6-6 6 6" stroke="#0ea5e9" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <rect x="14" y="33" width="20" height="3" rx="1.5" fill="#0ea5e9" opacity=".3"/>
          </svg>
        </div>
        <p class="drop-title">Glissez une photo ici</p>
        <p class="drop-sub">ou</p>
        <label class="btn btn--primary" for="file-input">
          Choisir un fichier
        </label>
        <input type="file" id="file-input" accept="image/*" hidden />
        <p class="drop-hint">JPG · PNG · WEBP — jusqu'à 16 Mo</p>
      </div>
    </section>

    <!-- Preview + Scan -->
    <section class="card preview-card hidden" id="preview-section">
      <div class="section-label">02 — APERÇU</div>
      <div class="preview-wrap">
        <img id="preview-img" src="" alt="aperçu" />
        <button class="btn btn--ghost btn--sm" id="change-btn">Changer d'image</button>
      </div>
      <button class="btn btn--primary btn--full" id="scan-btn">
        <span class="btn-text">Analyser l'image</span>
        <span class="btn-loader hidden"></span>
      </button>
    </section>

    <!-- Result -->
    <section class="card result-card hidden" id="result-section">
      <div class="section-label">03 — RÉSULTAT</div>
      <div id="result-body"></div>
    </section>

  </main>

  <script src="/static/js/app.js"></script>
</body>
</html>
